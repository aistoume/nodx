<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf7"/>
      <stop offset="100%" stop-color="#f0f0eb"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2C5282" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2C5282" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- Brand bar (top) -->
  <text x="330" y="50" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="20" font-weight="700" fill="#1a1a1a" letter-spacing="-0.4">
    nodx Lens
  </text>
  <text x="330" y="74" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="12" fill="#6b6b6b">
    Inline AI explanations · system-wide ⌥+E
  </text>

  <!-- Arrow from app to Applications folder -->
  <g transform="translate(260 200)">
    <line x1="0" y1="0" x2="135" y2="0" stroke="url(#arrow)" stroke-width="3"
          stroke-linecap="round"/>
    <polygon points="135,-10 155,0 135,10" fill="#2C5282" opacity="0.85"/>
  </g>

  <!-- "Drag to Applications" hint -->
  <text x="330" y="290" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="13" fill="#6b6b6b">
    Drag nodx Lens to your Applications folder
  </text>

  <!-- First-launch warning -->
  <text x="330" y="350" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#999">
    First launch: right-click the app → Open
  </text>
  <text x="330" y="368" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#999">
    (unsigned beta — proper sign-and-notarize coming soon)
  </text>
</svg>
