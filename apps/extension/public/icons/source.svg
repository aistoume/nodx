<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D6BA0"/>
      <stop offset="100%" stop-color="#1F3F66"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background with subtle vertical gradient -->
  <rect x="6" y="6" width="116" height="116" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Top half subtle shine -->
  <rect x="6" y="6" width="116" height="58" rx="28" ry="28" fill="url(#shine)"/>

  <!-- Magnifying glass -->
  <g stroke="#FFFFFF" stroke-linecap="round" fill="none">
    <!-- Lens -->
    <circle cx="50" cy="50" r="26" stroke-width="10"/>
    <!-- Handle -->
    <line x1="70" y1="70" x2="96" y2="96" stroke-width="12"/>
  </g>

  <!-- AI sparkle inside lens (4-point star) -->
  <path d="M50 32 L53 47 L68 50 L53 53 L50 68 L47 53 L32 50 L47 47 Z"
        fill="#FFFFFF" opacity="0.92"/>
  <!-- Tiny sub-star to add depth -->
  <path d="M65 38 L66.5 42.5 L71 44 L66.5 45.5 L65 50 L63.5 45.5 L59 44 L63.5 42.5 Z"
        fill="#FFFFFF" opacity="0.55"/>
</svg>
